<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비상주 위약금 계산기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 15px; }
.container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
.card { background: #fff; border: 1px solid #e2e2dd; border-radius: 12px; padding: 1.5rem; }
.badge { display: inline-block; background: #fef3c7; color: #92400e; font-size: 12px; padding: 4px 12px; border-radius: 6px; margin-bottom: 1.25rem; font-weight: 500; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.25rem; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 13px; color: #555; font-weight: 500; }
input { height: 40px; padding: 0 12px; border: 1px solid #d0d0d0; border-radius: 8px; background: #fafafa; color: #1a1a1a; font-size: 14px; }
input:focus { outline: none; border-color: #1a56db; background: #fff; }
.calc-btn { width: 100%; padding: 11px 0; background: #1a56db; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; margin-top: 4px; }
.calc-btn:hover { background: #1648c0; }
.result-box { background: #f8f8f5; border-radius: 8px; padding: 1rem 1.25rem; margin-top: 1.25rem; border: 1px solid #e8e8e4; }
.result-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #ebebeb; font-size: 14px; }
.result-row:last-child { border-bottom: none; }
.lbl { color: #666; }
.val { font-weight: 600; }
.val.green { color: #047857; font-size: 16px; }
.val.red { color: #b91c1c; font-size: 16px; }
.val.blue { color: #1a56db; }
.divider { border: none; border-top: 2px solid #e0e0dc; margin: 10px 0; }
.action-row { margin-top: 6px; background: #f0f7ff; border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
.action-lbl { font-size: 14px; font-weight: 600; color: #444; }
.action-val { font-size: 18px; font-weight: 700; }
.action-val.green { color: #047857; }
.action-val.red { color: #b91c1c; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 비상주 위약금 계산기</h1>
  <p class="subtitle">중도해지 시 정상가 기준 정산 금액을 계산합니다</p>

  <div class="card">
    <div class="badge">정상가 월 66,000원 · 월 단위 계산 (일할 아님)</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>실제 결제금액 (원)</label>
        <input type="number" id="paid" placeholder="예: 594000">
      </div>
      <div class="form-group">
        <label>계약 시작일</label>
        <input type="date" id="start-date">
      </div>
      <div class="form-group">
        <label>중도 해지일</label>
        <input type="date" id="end-date">
      </div>
    </div>
    <button class="calc-btn" onclick="calcNR()">정산 계산하기</button>

    <div class="result-box" id="nr-result" style="display:none">
      <div class="result-title">계산 결과</div>
      <div class="result-row"><span class="lbl">계약 시작일</span><span class="val" id="r-start"></span></div>
      <div class="result-row"><span class="lbl">중도 해지일</span><span class="val" id="r-end"></span></div>
      <div class="result-row"><span class="lbl">사용 개월 수</span><span class="val blue" id="r-months"></span></div>
      <hr class="divider">
      <div class="result-row"><span class="lbl">정상가 이용료 합계 (66,000 × 개월)</span><span class="val" id="r-normal"></span></div>
      <div class="result-row"><span class="lbl">실제 결제금액</span><span class="val" id="r-paid"></span></div>
      <div class="result-row"><span class="lbl">차액 (결제 − 정상가)</span><span class="val" id="r-diff"></span></div>
      <div class="action-row" id="r-action-row">
        <span class="action-lbl" id="r-act-lbl"></span>
        <span class="action-val" id="r-act-val"></span>
      </div>
    </div>
  </div>
</div>

<script>
function fmtW(n) { return '₩' + Math.round(n).toLocaleString('ko-KR'); }

function calcNR() {
  const paid = parseFloat(document.getElementById('paid').value) || 0;
  const startVal = document.getElementById('start-date').value;
  const endVal = document.getElementById('end-date').value;
  if (!startVal || !endVal) { alert('시작일과 해지일을 입력해주세요.'); return; }
  const start = new Date(startVal);
  const end = new Date(endVal);
  if (end < start) { alert('해지일이 시작일보다 앞입니다.'); return; }

  const sd = start.getDate();
  const sy = start.getFullYear(), sm = start.getMonth();
  const ey = end.getFullYear(), em = end.getMonth(), ed = end.getDate();
  let months = (ey - sy) * 12 + (em - sm);
  if (ed >= sd) months += 1;
  if (months < 1) months = 1;

  const normalTotal = months * 66000;
  const diff = paid - normalTotal;

  document.getElementById('r-start').textContent = startVal;
  document.getElementById('r-end').textContent = endVal;
  document.getElementById('r-months').textContent = months + '개월';
  document.getElementById('r-normal').textContent = fmtW(normalTotal);
  document.getElementById('r-paid').textContent = fmtW(paid);

  const diffEl = document.getElementById('r-diff');
  diffEl.textContent = (diff >= 0 ? '+' : '') + Math.round(diff).toLocaleString('ko-KR') + '원';
  diffEl.className = 'val ' + (diff > 0 ? 'green' : diff < 0 ? 'red' : '');

  const lbl = document.getElementById('r-act-lbl');
  const val = document.getElementById('r-act-val');
  const row = document.getElementById('r-action-row');
  if (diff > 0) {
    lbl.textContent = '💚 고객에게 환불할 금액';
    val.textContent = fmtW(diff);
    val.className = 'action-val green';
    row.style.background = '#f0fdf4';
  } else if (diff < 0) {
    lbl.textContent = '🔴 고객에게 추가 청구할 금액';
    val.textContent = fmtW(Math.abs(diff));
    val.className = 'action-val red';
    row.style.background = '#fff5f5';
  } else {
    lbl.textContent = '✅ 정산 결과';
    val.textContent = '차액 없음';
    val.className = 'action-val';
    row.style.background = '#f8f8f5';
  }
  document.getElementById('nr-result').style.display = 'block';
}
</script>
</body>
</html>
